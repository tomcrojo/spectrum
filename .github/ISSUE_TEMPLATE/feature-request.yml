name: Feature request
description: Propose an improvement or new workflow.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Spectrum is being built in public. The strongest requests describe the problem, not just the UI.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the shape of the feature you want.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Links, mockups, or examples from other tools.
