appId: com.spectrum.app
productName: Spectrum
directories:
  buildResources: build
disableDefaultIgnoredFiles: true
files:
  - out/**/*
  - package.json
  - node_modules/**/*
extraResources:
  - from: resources/browser-cli
    to: browser-cli
  - from: build/t3code-runtime
    to: t3code
  - from: src/main/db/migrations
    to: migrations
  - from: build/node-bin
    to: node-bin
mac:
  category: public.app-category.developer-tools
  icon: icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  artifactName: ${name}-${version}-${os}-${arch}.${ext}
linux:
  icon: build/icon.png
  target:
    - AppImage
  artifactName: ${name}-${version}-${os}-${arch}.${ext}
win:
  icon: build/icon.png
  target:
    - nsis
  artifactName: ${name}-${version}-${os}-${arch}.${ext}
npmRebuild: true
